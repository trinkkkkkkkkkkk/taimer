<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наше время ❤️</title>

<!-- Романтический шрифт для текста -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<!-- Шрифт для кнопок -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Dancing Script', cursive;
  text-align:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow: hidden;
}

h1{
  font-size:50px;
  font-weight:700;
}

.timer{
  font-size:28px;
  margin:10px;
  font-weight:bold;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  font-family: 'Pacifico', cursive; /* новый шрифт для кнопок */
  transition: transform 0.2s;
}

button:hover{
  transform: scale(1.1);
}

.dark{
  background:#111;
}

#message{
  margin-top:20px;
  font-size:22px;
}

/* сердечки */
.heart{
  position:fixed;
  width:12px;
  height:12px;
  background:red;
  transform: rotate(45deg);
  top:-20px;
  pointer-events:none;
  animation-name:fallHeart;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
}

.heart::before{
  top:-6px;
  left:0;
}
.heart::after{
  top:0;
  left:-6px;
}

@keyframes fallHeart{
  0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
}

/* фейерверк частицы */
.firework {
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  pointer-events:none;
  opacity:1;
  animation-name:explode;
  animation-timing-function: ease-out;
}

@keyframes explode {
  to {
    transform: translate(var(--x,0px), var(--y,0px));
    opacity:0;
  }
}
</style>

</head>

<body>

<h1>❤️ Наше время вместе ❤️</h1>

<div>Мы вместе уже:</div>
<div id="timerTogether" class="timer">...</div>

<div style="margin-top:20px;">До нашей годовщины осталось:</div>
<div id="timerAnniversary" class="timer">...</div>

<button onclick="newMessage()">💌 Случайное сообщение</button>
<button onclick="toggleTheme()">🌙 Сменить тему</button>

<div id="message"></div>

<script>
/* Таймеры */
const startDate = new Date("2025-12-17 00:00:00");
const anniversary = new Date("2026-12-17 00:00:00");

function updateTimers(){
  const now = new Date();

  const diff = now - startDate;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);
  document.getElementById("timerTogether").innerHTML =
    days+" дней "+hours+" часов "+minutes+" минут "+seconds+" секунд";

  const diff2 = anniversary - now;
  const d = Math.floor(diff2/(1000*60*60*24));
  const h = Math.floor((diff2/(1000*60*60))%24);
  const m = Math.floor((diff2/(1000*60))%60);
  const s = Math.floor((diff2/1000)%60);
  document.getElementById("timerAnniversary").innerHTML =
    d+" дней "+h+" часов "+m+" минут "+s+" секунд";
}

setInterval(updateTimers,1000);
updateTimers();

/* Сообщения */
const messages=[
"Я люблю тебя ❤️",
"Ты моё счастье",
"Спасибо что ты рядом",
"Ты лучшая девушка",
"Наше время только начинается ✨"
];

function newMessage(){
  const msg=messages[Math.floor(Math.random()*messages.length)];
  document.getElementById("message").innerText=msg;
}

/* Тема */
let darkTheme = false;
function toggleTheme(){
  darkTheme = !darkTheme;
  document.body.classList.toggle("dark");

  // обновляем цвет сердечек
  document.querySelectorAll(".heart").forEach(h=>{
    h.style.background = darkTheme ? "#ff69b4" : "red";
    h.querySelectorAll(":before, :after").forEach(p=>{
      p.style.background = darkTheme ? "#ff69b4" : "red";
    });
  });
}

/* Постоянные падающие сердечки */
function createHearts(count=30){
  for(let i=0;i<count;i++){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*5) + "s";
    heart.style.background = darkTheme ? "#ff69b4" : "red";
    document.body.appendChild(heart);
  }
}
createHearts(50);

/* Фейерверк при клике */
document.body.addEventListener("click", e => {
  const colors = ["#ff3b3b","#ffbd3b","#3bff88","#3bafff","#d33bff"];
  for(let i=0;i<20;i++){
    const particle = document.createElement("div");
    particle.classList.add("firework");
    particle.style.left = e.clientX + "px";
    particle.style.top = e.clientY + "px";
    particle.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = Math.random()*2*Math.PI;
    const radius = Math.random()*80 + 30; // дальность
    particle.style.setProperty("--x", Math.cos(angle)*radius + "px");
    particle.style.setProperty("--y", Math.sin(angle)*radius + "px");
    particle.style.animationDuration = (0.8 + Math.random()*0.7) + "s";
    document.body.appendChild(particle);
    setTimeout(()=>particle.remove(),1500);
  }
});
</script>

</body>
</html>
