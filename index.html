<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наше время ❤️</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  
  .click-heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:popHeart 1s ease forwards;
}

@keyframes popHeart{
0%{
transform:scale(0.5);
opacity:1;
}
100%{
transform:translateY(-80px) scale(1.5);
opacity:0;
}
}
}

h1{
  font-size:40px;
}

.timer{
  font-size:28px;
  margin:10px;
  font-weight:bold;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.dark{
  background:#111;
}

#message{
  margin-top:20px;
  font-size:20px;
}
</style>

</head>

<body>

<h1>❤️ Наше время вместе ❤️</h1>

<div>Мы вместе уже:</div>
<div id="timerTogether" class="timer">...</div>

<div style="margin-top:20px;">До нашей годовщины осталось:</div>
<div id="timerAnniversary" class="timer">...</div>

<button onclick="newMessage()">💌 Случайное сообщение</button>
<button onclick="toggleTheme()">🌙 Сменить тему</button>
<button onclick="confetti()">🎉 Праздник</button>

<div id="message"></div>

<script>

const startDate = new Date("2025-12-17 00:00:00");
const anniversary = new Date("2026-12-17 00:00:00");

function updateTimers(){

const now = new Date();

/* время вместе */

const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("timerTogether").innerHTML =
days+" дней "+hours+" часов "+minutes+" минут "+seconds+" секунд";

/* до годовщины */

const diff2 = anniversary - now;

const d = Math.floor(diff2/(1000*60*60*24));
const h = Math.floor((diff2/(1000*60*60))%24);
const m = Math.floor((diff2/(1000*60))%60);
const s = Math.floor((diff2/1000)%60);

document.getElementById("timerAnniversary").innerHTML =
d+" дней "+h+" часов "+m+" минут "+s+" секунд";

}

setInterval(updateTimers,1000);
updateTimers();

/* сообщения */

const messages=[
"Я люблю тебя ❤️",
"Ты моё счастье",
"Спасибо что ты рядом",
"Ты лучшая девушка",
"Наше время только начинается ✨"
];

function newMessage(){
const msg=messages[Math.floor(Math.random()*messages.length)];
document.getElementById("message").innerText=msg;
}

/* тема */

function toggleTheme(){
document.body.classList.toggle("dark");
}

/* конфетти */

function confetti(){
for(let i=0;i<40;i++){
const el=document.createElement("div");
el.style.position="fixed";
el.style.left=Math.random()*100+"vw";
el.style.top="-10px";
el.style.width="8px";
el.style.height="8px";
el.style.background="white";
el.style.animation="fall 3s linear";
document.body.appendChild(el);

setTimeout(()=>el.remove(),3000);
}
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
`;
document.head.appendChild(style);

</script>

</body>
</html>
